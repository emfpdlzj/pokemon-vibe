<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포켓몬 데모</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 시작 화면 -->
  <div id="start-screen">
    <h1>포켓몬스터2</h1>
    <p>소프트웨어학과 박민정</p>
    <input id="name-input" type="text" maxlength="10" placeholder="이름을 입력하세요" value="주인공">
    <button id="start-btn" class="btn" type="button">새 게임 시작</button>
  </div>

  <!-- 게임 래퍼 -->
  <div id="game-wrapper">

    <!-- HUD -->
    <div id="hud">
      <span id="hud-map">📍 시작 마을</span>
      <span id="hud-starter">파트너: 없음</span>
    </div>

    <!-- 캔버스 -->
    <canvas id="game-canvas"></canvas>

    <!-- 대화창 -->
    <div id="dialogue-box">
      <div id="dialogue-speaker"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-next">▼ Enter</div>
    </div>

    <!-- 선택지 -->
    <div id="choices"></div>

  </div>

  <!-- 스타터 선택 오버레이 -->
  <div id="starter-overlay">
    <div id="starter-panel">
      <h2>파트너를 선택하세요!</h2>
      <div id="starter-cards"></div>
      <p style="color:#aaa;font-size:0.8rem">카드를 클릭해서 선택</p>
    </div>
  </div>

  <!-- 전투 화면 -->
  <div id="battle-screen">
    <canvas id="battle-canvas"></canvas>
    <div id="battle-ui">
      <div id="battle-log">전투 준비 중...</div>
      <div id="battle-buttons">
        <button id="b-attack" class="btn" disabled>⚔️ 공격</button>
        <button id="b-skill"  class="btn" disabled>✨ 필살기</button>
        <button id="b-run"    class="btn" disabled>🏃 도망</button>
      </div>
    </div>
  </div>

  <div id="fade-overlay" aria-hidden="true"></div>

  <!-- 데이터 & 게임 스크립트 -->
  <script src="data/maps.js"></script>
  <script src="data/dialogues.js"></script>
  <script src="game.js"></script>
  <script src="battle.js"></script>

</body>
</html>
